name: GitHub Metrics
on:
  schedule:
    - cron: "0 6 * * *"   # se regenera todos los días a las 06:00 UTC
  workflow_dispatch:        # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          # --- Privacidad: solo información pública ---
          # Con un token que SOLO tiene los scopes "public_repo" y "read:user",
          # esta acción físicamente no puede leer tus repos privados.
          repositories_affiliations: owner
          repositories_forks: false

          # --- Plugins ---
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 8

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          plugin_habits: yes
          plugin_habits_charts_type: bars
          plugin_habits_facts: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year